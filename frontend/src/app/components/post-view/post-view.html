<user-header
  [material]="{ type: 'POST', id: data().id }"
  [actions]="['BAN_USER', 'DELETE', 'HIDE']"
  [owner]="data().owner"
  [createdAt]="data().createdAt"
  (edit)="edit()"
  (report)="reportService.reportPost(data().id)"
/>

<post-content [title]="data().title" [content]="data().content" />

<post-footer [data]="data()" (comment)="comment.emit()" (like)="like($event)" />
