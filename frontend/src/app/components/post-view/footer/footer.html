<mat-card-actions>
  <div class="states">
    <button [matButton]="data().liked ? 'filled' : 'outlined'" (click)="onLike()">
      <mat-icon>handshake</mat-icon>
      {{ data().likesCount }}
    </button>
    <button matButton="outlined" (click)="comment.emit()">
      <mat-icon>mode_comment</mat-icon>
      {{ data().commentsCount }}
    </button>
  </div>
  <button class="readMore" matButton (click)="readMore()">read more</button>
</mat-card-actions>
