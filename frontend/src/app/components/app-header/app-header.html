<mat-toolbar color="surface" class="app-header">
  <!-- Mobile menu button -->
  <button mat-icon-button class="mobile-only" [matMenuTriggerFor]="menu">
    <mat-icon>menu</mat-icon>
  </button>

  <!-- Title / Logo -->
  <span class="title" (click)="router.navigateByUrl('/')">01blog</span>

  <span class="spacer"></span>

  <!-- Desktop actions -->
  <div class="desktop-only">
    <!-- Primary action -->
    <button mat-flat-button color="primary" (click)="router.navigateByUrl('/posts/edit')">
      <mat-icon>add</mat-icon>
      New post
    </button>

    <!-- User menu trigger -->
    <button mat-icon-button [matMenuTriggerFor]="userMenu">
      <mat-icon>account_circle</mat-icon>
    </button>
  </div>
</mat-toolbar>

<!-- Mobile menu -->
<mat-menu #menu="matMenu">
  <button mat-menu-item (click)="router.navigateByUrl('/posts/edit')">
    <mat-icon>add</mat-icon>
    <span>New post</span>
  </button>

  <button mat-menu-item [matMenuTriggerFor]="userMenu">
    <mat-icon>account_circle</mat-icon>
    <span>User Menu</span>
  </button>
</mat-menu>

<!-- User menu -->
<mat-menu #userMenu="matMenu">
  <button mat-menu-item (click)="router.navigateByUrl('/users/' + user.accountId)">
    <mat-icon>person</mat-icon>
    <span>Profile</span>
  </button>

  @if (showPanel) {
    <button mat-menu-item (click)="router.navigateByUrl('/moderation/panel')">
      <mat-icon>admin_panel_settings</mat-icon>
      <span>Moderation</span>
    </button>
  }

  <button mat-menu-item (click)="logout()">
    <mat-icon>logout</mat-icon>
    <span>Logout</span>
  </button>
</mat-menu>
