<mat-tab-group [selectedIndex]="selectedIndex()" (selectedIndexChange)="changeTab($event)">
  @for (tab of tabs; track tab.permission) {
    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon fontSet="material-symbols-outlined">{{ tab.icon }}</mat-icon>
        {{ tab.label }}
      </ng-template>
      <section>
        <ng-container *ngComponentOutlet="$any(tab.component)" />
      </section>
    </mat-tab>
  }
</mat-tab-group>
