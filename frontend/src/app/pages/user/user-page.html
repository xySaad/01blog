<mat-card class="userInfo">
  <user-header
    [material]="{ type: 'USER', id: user().accountId }"
    [deleted]="user().banned"
    [owner]="user()"
    [actions]="['BAN_USER', 'DELETE']"
    (report)="reportService.reportUser(user().accountId)"
  />
  <mat-card-content class="states">
    <div class="followers">
      {{ user().followersCount }}
      follower
    </div>
    <div class="following">
      {{ user().followingCount }}
      following
    </div>
  </mat-card-content>
</mat-card>
<mat-toolbar> Posts ({{ posts().length }}) </mat-toolbar>
<div class="posts">
  @for (post of posts(); track $index) {
    <post-card [data]="post" />
  }
</div>
